<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 340px;
      background: #fff;
      color: #111;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .header-title { font-size: 14px; font-weight: 600; color: #111; }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      font-size: 18px;
      padding: 2px 4px;
      line-height: 1;
    }
    .settings-btn:hover { color: #374151; }
    .body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
    input, textarea, select {
      font-family: inherit;
      font-size: 13px;
      color: #111;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 6px 10px;
      width: 100%;
      background: #fff;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: #3b82f6; }
    textarea { resize: vertical; min-height: 80px; max-height: 160px; }
    .footer { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 8px; }
    .btn {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .msg { font-size: 12px; text-align: center; padding: 4px 0; }
    .msg.success { color: #16a34a; }
    .msg.error { color: #dc2626; }
    .no-token {
      padding: 20px 16px;
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .no-token a { color: #2563eb; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Applied</span>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
  </div>

  <div id="noToken" class="no-token" style="display:none">
    No token set.<br/>
    <a id="openSettings">Open settings</a> to connect your Applied account.
  </div>

  <div id="main" style="display:none">
    <div class="body">
      <div class="field">
        <label>Company</label>
        <input id="company" placeholder="Company name" />
      </div>
      <div class="field">
        <label>Role</label>
        <input id="role" placeholder="Job title" />
      </div>
      <div class="field">
        <label>Location</label>
        <input id="location" placeholder="City, State or Remote" />
      </div>
      <div class="field">
        <label>Status</label>
        <select id="status">
          <option value="applied">Applied</option>
          <option value="screening">Screening</option>
          <option value="interview">Interview</option>
          <option value="offer">Offer</option>
        </select>
      </div>
      <div class="field">
        <label>Job Description</label>
        <textarea id="description" placeholder="Paste or auto-filled job description…"></textarea>
      </div>
    </div>
    <div class="footer">
      <div id="msg" class="msg" style="display:none"></div>
      <button class="btn btn-primary" id="submitBtn">Add to Applied</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
