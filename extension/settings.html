<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Applied Extension Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #111;
      background: #f9fafb;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .card p { font-size: 13px; color: #6b7280; margin-bottom: 16px; line-height: 1.5; }
    label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    input {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .msg { font-size: 13px; margin-top: 10px; }
    .msg.success { color: #16a34a; }
    .msg.error { color: #dc2626; }
    code {
      font-size: 11px;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>Applied Extension Settings</h1>

  <div class="card">
    <h2>Connection</h2>
    <p>
      Enter your Applied API URL and auth token.<br />
      To get your token, go to your Applied app → <strong>Settings</strong> → copy the extension token.
    </p>

    <input id="apiUrl" type="hidden" value="https://backend-production-ab8c.up.railway.app/api" />

    <label>Auth Token</label>
    <input id="token" type="password" placeholder="Paste your Clerk token here" />

    <button class="btn btn-primary" id="saveBtn">Save</button>
    <div id="msg" class="msg" style="display:none"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
